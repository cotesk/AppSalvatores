<h2 mat-dialog-title style="font-weight: 600; color: #2c3e50;">Ventas Fiadas</h2>

<mat-dialog-content *ngIf="ventas" class="contenido-dialogo">

  <div class="info-cliente">
    <p><strong>Cliente:</strong> {{ ventas.nombreCliente }}</p>
    <p><strong>Total Fiado:</strong> {{ this.formatearNumero2(ventas.totalFiado) }}</p>
  </div>

  <div class="tabla-container">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 tabla-fiado">

      <ng-container matColumnDef="numeroDocumento">
        <th mat-header-cell *matHeaderCellDef>N° Documento</th>
        <td mat-cell *matCellDef="let venta">{{ venta.numeroDocumento }}</td>
      </ng-container>

      <ng-container matColumnDef="fecha">
        <th mat-header-cell *matHeaderCellDef>Fecha</th>
        <td mat-cell *matCellDef="let venta">{{ venta.fechaRegistro }}</td>
      </ng-container>

      <ng-container matColumnDef="total">
        <th mat-header-cell *matHeaderCellDef>Total</th>
        <td mat-cell *matCellDef="let venta">{{ this.formatearNumero(venta.totalTexto) }}</td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="primary" (click)="verDetalle(element)" matTooltip="Ver Detalle">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button class="btn-verde" (click)="pagarVenta(element)" matTooltip="Registrar Pago">
            <mat-icon>payments</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnasTabla"></tr>
      <tr mat-row *matRowDef="let row; columns: columnasTabla;"></tr>
    </table>

    <mat-paginator [pageSize]="3" [pageSizeOptions]="[3]" showFirstLastButtons aria-label="Selector de página">
    </mat-paginator>
  </div>

</mat-dialog-content>

<mat-dialog-actions align="end">
  <div class="acciones-dialogo">
    <button mat-flat-button class="btn-azul" (click)="confirmarPagoTotal()">Pagar Todo</button>
    <button mat-button mat-dialog-close class="btn-rojo">Cerrar</button>
  </div>
</mat-dialog-actions>
