<div class="product-list">
  <div class="header">
    <h2>Productos con cantidades muy bajas</h2>
  </div>
  <div class="table-container">
    <table mat-table [dataSource]="dataListaProductos" class="mat-elevation-z8">
      <!-- Imagen Column -->
       <ng-container matColumnDef="imagen">
          <th mat-header-cell *matHeaderCellDef style="text-align: center;">
            Img</th>
          <td mat-cell *matCellDef="let element" style=" text-align: center;">
            <!-- Usa la etiqueta <img> para mostrar la imagen -->
            <div style="position: relative; display: inline-block;">
              <!-- Imagen principal con efecto hover -->
         <img [src]="element.imagenUrl[0]" 
     alt="Imagen del producto" 
     class="img-hover-zoom"
     (click)="verImagen(element)" 
     loading="lazy"
     style="width: 60px; height: 60px; object-fit: contain; border-radius: 4px;">

              <!-- Identificador con cantidad de imágenes -->
              <span *ngIf="element.imagenUrl?.length > 1" style="
          position: absolute;
          top: 5px;
          right: -5px;
          background-color: #4caf50;
          color: white;
          border-radius: 50%;
          padding: 2px 6px;
          font-size: 10px;
          font-weight: bold;
          line-height: 1;
        ">
                +{{ element.imagenUrl.length }}
              </span>
            </div>

          </td>
        </ng-container>

      <!-- Nombre Column -->
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef class="text-center"> Nombre </th>
        <td mat-cell *matCellDef="let producto" class="text-center">
          {{ producto.nombre | slice:0:40 }}{{ producto.nombre.length > 40 ? '...' : '' }}
        </td>
      </ng-container>

      <!-- Stock Column -->
      <ng-container matColumnDef="stock">
        <th mat-header-cell *matHeaderCellDef class="text-center"> Stock </th>
        <td mat-cell *matCellDef="let producto" [ngClass]="{'texto-rojo': producto.stock === 0}" class="text-center">
          {{ producto.stock === 0 ? 'Agotado' : producto.stock }}
        </td>
      </ng-container>

      <!-- Precio Column -->
      <ng-container matColumnDef="precio">
        <th mat-header-cell *matHeaderCellDef class="text-center"> Precio </th>
        <td mat-cell *matCellDef="let element" class="text-center"> {{ formatearNumero(element.precio) }} </td>
      </ng-container>

      <!-- Botones Column -->
      <ng-container matColumnDef="botones">
        <th mat-header-cell *matHeaderCellDef class="text-center"> Acciones </th>
        <td mat-cell *matCellDef="let producto" class="text-center">
          <button mat-icon-button color="primary" (click)="onCloseClick()">
            <mat-icon>done</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="['imagen', 'nombre', 'stock', 'precio', 'botones']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['imagen', 'nombre', 'stock', 'precio', 'botones'];"></tr>
    </table>
  </div>
  <mat-paginator #paginator [length]="totalProductos" [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons (page)="onPageChange($event)"></mat-paginator>
</div>

<br>
