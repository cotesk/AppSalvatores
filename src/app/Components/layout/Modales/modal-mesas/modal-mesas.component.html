<h2 mat-dialog-title style="text-align: center;">{{tituloAccion}} Mesas</h2>

<mat-dialog-content
    [ngStyle]="{'width': '100%', 'max-width.px': 430, 'height.px': modoEdicion ? 180 : 220, 'overflow-y': 'auto'}">
    <form [formGroup]="formularioCategoria" class="form-container">
        <mat-grid-list cols="1" rowHeight="90px">


            <mat-form-field class="full-width" appearance="fill">
                <mat-label>Nombre</mat-label>
                <input matInput autocomplete="off" formControlName="nombreMesa">
                <mat-icon matSuffix>category</mat-icon>
              
                <mat-error *ngIf="formularioCategoria.get('nombreMesa')?.hasError('maxlength')">
                    El nombre no puede exceder los 40 caracteres.
                </mat-error>
            </mat-form-field>



            <mat-form-field class="full-width" appearance="fill">
                <mat-label>Tipo</mat-label>
                <mat-select formControlName="tipo">

                    <mat-option value="Local">
                        <mat-icon class="icon-green"
                            style="vertical-align: middle; margin-right: 5px;">event_seat</mat-icon>
                        Local
                    </mat-option>

                    <mat-option value="De paso">
                        <mat-icon class="icon-red"
                            style="vertical-align: middle; margin-right: 5px;">directions_walk</mat-icon>
                        De paso
                    </mat-option>

                </mat-select>
            </mat-form-field>


            <mat-form-field *ngIf="!modoEdicion" class="full-width" appearance="fill">
                <mat-label>Estado</mat-label>
                <mat-select asp-for="esActivo" formControlName="ocupada">

                    <mat-option value="0">
                        <mat-icon class="icon-green">check_circle</mat-icon> No Ocupada
                    </mat-option>
                    <mat-option value="1">
                        <mat-icon class="icon-red">highlight_off</mat-icon>Ocupada
                    </mat-option>

                </mat-select>
            </mat-form-field>






        </mat-grid-list>
    </form>
</mat-dialog-content>

<mat-dialog-actions class="dialog-actions">
    <button mat-raised-button class="agregar" [disabled]="formularioCategoria.invalid" (click)="guardarEditar_mesa()">
        <mat-icon>save</mat-icon> {{botonAccion}}
    </button>
    <button mat-raised-button mat-dialog-close color="warn">
        <mat-icon>close</mat-icon> Volver
    </button>
</mat-dialog-actions>
